<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetworkSelector Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const { ChevronDown, AlertTriangle } = lucide;

        function NetworkSelector({ onNetworkChange }) {
            const [selectedNetwork, setSelectedNetwork] = useState("mainnet");
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);

            const networks = [
                {
                    id: "mainnet",
                    name: "Stellar Mainnet",
                    description: "Production network"
                },
                {
                    id: "testnet", 
                    name: "Stellar Testnet",
                    description: "Development network"
                }
            ];

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };

                document.addEventListener("mousedown", handleClickOutside);
                return () => {
                    document.removeEventListener("mousedown", handleClickOutside);
                };
            }, []);

            const handleNetworkSelect = (network) => {
                setSelectedNetwork(network);
                setIsOpen(false);
                if (onNetworkChange) {
                    onNetworkChange(network);
                }
            };

            const selectedNetworkData = networks.find(n => n.id === selectedNetwork);

            return (
                <div className="relative" ref={dropdownRef}>
                    <button
                        onClick={() => setIsOpen(!isOpen)}
                        className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 transition-colors min-w-[160px] justify-between"
                    >
                        <div className="flex items-center gap-2">
                            <div className="w-5 h-5 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center">
                                <div className="w-2 h-2 bg-white rounded-full"></div>
                            </div>
                            <span className="font-medium text-white text-sm">
                                {selectedNetworkData?.name.replace("Stellar ", "")}
                            </span>
                        </div>
                        <ChevronDown 
                            size={16} 
                            className={`text-slate-400 transition-transform ${isOpen ? "rotate-180" : ""}`}
                        />
                    </button>

                    {selectedNetwork === "testnet" && (
                        <div className="absolute -top-2 -right-2 bg-yellow-500 text-slate-900 rounded-full px-2 py-1 text-xs font-bold flex items-center gap-1">
                            <AlertTriangle size={10} />
                            Testnet
                        </div>
                    )}

                    {isOpen && (
                        <div className="absolute top-full right-0 mt-1 bg-slate-800 border border-slate-600 rounded-lg shadow-lg z-50 overflow-hidden min-w-[200px]">
                            {networks.map((network) => (
                                <button
                                    key={network.id}
                                    onClick={() => handleNetworkSelect(network.id)}
                                    className={`w-full text-left px-4 py-3 transition-colors ${
                                        network.id === selectedNetwork
                                            ? "bg-blue-600/20 text-blue-400"
                                            : "hover:bg-slate-700 text-white"
                                    }`}
                                >
                                    <div className="flex items-center gap-3">
                                        <div className="w-5 h-5 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center flex-shrink-0">
                                            <div className="w-2 h-2 bg-white rounded-full"></div>
                                        </div>
                                        <div className="flex-1">
                                            <div className="font-medium text-sm">{network.name}</div>
                                            <div className="text-xs text-slate-400">{network.description}</div>
                                        </div>
                                        {network.id === selectedNetwork && (
                                            <div className="w-2 h-2 bg-blue-400 rounded-full"></div>
                                        )}
                                    </div>
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [network, setNetwork] = useState("mainnet");

            return (
                <div className="space-y-8">
                    <h1 className="text-2xl font-bold">NetworkSelector Test</h1>
                    
                    <div className="space-y-4">
                        <h2 className="text-lg font-semibold">Network Selector Component:</h2>
                        <NetworkSelector onNetworkChange={setNetwork} />
                    </div>

                    <div className="bg-slate-800 p-4 rounded-lg">
                        <h3 className="text-sm font-medium text-slate-400 mb-2">Current Selection:</h3>
                        <p className="text-lg font-mono">{network}</p>
                    </div>

                    <div className="bg-slate-800 p-4 rounded-lg">
                        <h3 className="text-sm font-medium text-slate-400 mb-2">Features:</h3>
                        <ul className="text-sm space-y-1">
                            <li>✅ Dropdown with Stellar Mainnet and Testnet options</li>
                            <li>✅ Stellar logo next to network names</li>
                            <li>✅ React state management for selection</li>
                            <li>✅ Yellow "Testnet" warning badge when testnet is selected</li>
                            <li>✅ Click outside to close dropdown</li>
                            <li>✅ Hover effects and transitions</li>
                        </ul>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
